services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dailynagger-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    depends_on:
      - sqlserver
    command: >
      /bin/bash -c "
      until /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\"; do
        sleep 2;
      done;
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"IF DB_ID('DailyNagger') IS NULL CREATE DATABASE DailyNagger\";
      "

  api:
    build:
      context: .
      dockerfile: src/DailyNagger.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_SYSTEM_NET_DISABLEIPV6: "1"
      ConnectionStrings__DailyNagger: "Server=host.docker.internal,1433;Database=DailyNagger;User Id=sa;Password=${MSSQL_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True"
    ports:
      - "5007:8080"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully

  client:
    build:
      context: .
      dockerfile: src/DailyNagger.Client/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  sqlserver-data:
